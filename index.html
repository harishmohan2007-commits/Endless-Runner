<!DOCTYPE html>

<html>
<head>
<title>AntiGravity Runner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="home">

<h1>AntiGravity Runner</h1>

<button onclick="startGame()">PLAY</button>

<p>High Score: <span id="high">0</span></p>

</div>

<script>
function startGame(){
window.location.href = "game.html";
}

let h = localStorage.getItem("highscore") || 0;
document.getElementById("high").innerText = h;
</script>

</body>
</html>
