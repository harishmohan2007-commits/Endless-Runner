<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AntiGravity Runner</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="title">AntiGravity Runner</h1>

<div class="uiBar">

<button id="homeBtn">Home</button> <button id="pauseBtn">Pause</button> <button id="restartBtn">Restart</button>

<div class="scoreBoard">
Score : <span id="score">0</span>
</div>

</div>

<canvas id="gameCanvas" width="1000" height="400"></canvas>

</div>

<div id="gameOverScreen" class="gameOver">

<h2>Game Over</h2>

<p>Score: <span id="finalScore"></span></p>

<p>High Score: <span id="highScore"></span></p>

<button id="playAgain">Play Again</button> <button onclick="goHome()">Home</button>

</div>

<script>
function goHome(){
window.location.href="index.html";
}
</script>

<script src="game.js"></script>

</body>
</html>
